name: Python CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the source code from GitHub repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Install Python 3.9
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-python-version: '3.9'
        cache: 'pip' # cache pip dependencies to speed up future runs

    # 3. Create mock directories needed by the pipeline
    - name: Setup Workspace Directories
      run: |
        mkdir -p data/raw data/processed config logs
        cp .env.example .env

    # 4. Generate the raw dummy dataset for ingestion tests
    - name: Generate Mock Data
      run: |
        python scripts/generate_synthetic_data.py

    # 5. Install libraries from requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 6. Run all automated Pytest unit tests
    - name: Run Pytest Suite
      run: |
        pytest
