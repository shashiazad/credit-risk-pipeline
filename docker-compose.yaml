version: '3.8'

x-airflow-common: &airflow-common
  build: .
  environment:
    # Set the backend database to our PostgreSQL service
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    # Use LocalExecutor to run tasks in parallel using process workers
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # Disable example DAGs
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    # Core variables for our ingestion/loader python scripts
    PROJECT_ROOT: /opt/airflow
    RAW_DATA_PATH: /opt/airflow/data/raw
    PROCESSED_DATA_PATH: /opt/airflow/data/processed
    GCP_PROJECT_ID: your-gcp-project-id
    GCP_DATASET_NAME: loan_risk_dw
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/config/gcp-credentials.json
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./config:/opt/airflow/config
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./scripts:/opt/airflow/scripts
  depends_on:
    postgres:
      condition: service_healthy

services:
  # Metadata Database Service
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Init container to migrate database schema and create default admin login
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      --password admin"
    depends_on:
      postgres:
        condition: service_healthy

  # Airflow Webserver UI Service (accessible at localhost:8080)
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # Airflow Scheduler Service (monitors DAGs and triggers tasks)
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # Live Data Generator Service (generates new batch files inside the landing volume)
  data-generator:
    <<: *airflow-common
    command: python scripts/stream_simulation.py
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
